<div class="listItemBackground">
    <div class="content">
        <div class="line">
            <h2 class="h2Title">{{title}}</h2>

            @if (title2.startsWith('+')) {
            <p class="title2Green">
                + {{ title2Number | number:'1.2-2' }}
            </p>
            } @else if (title2.startsWith('-')) {
            <p class="title2Red">
                - {{ title2Number | number:'1.2-2' }}
            </p>
            } @else {
            <p class="title2">
                {{title2}}
            </p>
            }

        </div>
        <div class="line">
            <p class="subtitle">{{truncatedSubtitle}}</p>
            <p class="subtitle2">{{subtitle2}}</p>
        </div>
    </div>
</div>
