<section class="content">
    <form #pesquisaForm="ngForm">
        <mat-card>
            <mat-card-header>
                <mat-card-title> Lista de Funções </mat-card-title>
                <mat-card-subtitle> Gerencie todas as funções do sistema </mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <div class="search-container">
                    <div class="search-input">
                        <mat-icon class="search-icon" fontIcon="search"></mat-icon>
                        <input [(ngModel)]="termoBusca" (ngModelChange)="buscaLive($event)" name="termoBusca"
                            type="text" placeholder="Buscar por função" />
                        @if (termoBusca) {
                        <button type="button" class="clear-search" (click)="limparBusca()" aria-label="Limpar busca">
                            <mat-icon fontIcon="close"></mat-icon>
                        </button>
                        }
                    </div>
                    <button class="csvButton" type="button" (click)="exportar()">
                        <lucide-angular class="icon" [size]="20" [img]="Download"></lucide-angular>
                        Exportar
                    </button>
                </div>
            </mat-card-content>

            <div class="table">
                <table mat-table [dataSource]="funcoesPaginadas">
                    <ng-container matColumnDef="funcao">
                        <th mat-header-cell *matHeaderCellDef>Função</th>
                        <td mat-cell *matCellDef="let funcao">
                            <span [matTooltip]="funcao.nomeFuncao || 'Sem função'" matTooltipPosition="above">
                                {{ truncateFuncao(funcao.nomeFuncao) }}
                            </span>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="acoes">
                        <th mat-header-cell *matHeaderCellDef>Ações</th>
                        <td mat-cell *matCellDef="let funcao">
                            <div class="buttons">
                                <button (click)="preparaEditar(funcao.id)">
                                    <lucide-angular [img]="SquarePen" [size]="20"></lucide-angular>
                                </button>
                                <button type="button" (click)="preparaDeletar(funcao)">
                                    <lucide-angular [img]="Trash2" [size]="20" color="red"></lucide-angular>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="quantidade">
                        <th mat-header-cell *matHeaderCellDef>Quantidade Cadastrados</th>
                        <td mat-cell *matCellDef="let funcao">
                            {{ calculoQuantidade(funcao) }}
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="columnsTable"></tr>
                    <tr mat-row *matRowDef="let row; columns: columnsTable;"></tr>
                </table>
            </div>
            @if (listaFuncoes.length >= 1) {
            <div class="paginador">
                <button (click)="currentPage = currentPage - 1; atualizarLista()"
                    [disabled]="currentPage === 1">«</button>
                <span>Página {{currentPage}} de {{totalPages}}</span>
                <button (click)="currentPage = currentPage + 1; atualizarLista()"
                    [disabled]="currentPage === totalPages">»</button>
            </div>
            }
        </mat-card>
    </form>
</section>
