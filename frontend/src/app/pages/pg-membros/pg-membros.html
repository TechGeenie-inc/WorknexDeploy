<div class="page-container">
    <h1>Gerenciamento de Membros</h1>
    <p>Cadastre e gerencie todos os freelancers do sistema</p>
    <app-small-card-section>
        <app-small-card title="Total de Membros" mainText="{{ totalMembros }}" subtitle="Freelancers Cadastrados"
            [icon]="User" color="blue">
        </app-small-card>
        <app-small-card title="Valor Venda/Hora  " mainText="R$ {{ mediaPrecoHora | number: '1.2-2'}}"
            subtitle="Média dos valores por hora" [icon]="DollarSign" color="green">
        </app-small-card>
        <app-small-card title="Horas Potenciais" [icon]="Clock" color="orange" mainText="{{ horasPotenciais }} h"
            subtitle="Capacidade mensal total">
        </app-small-card>
        <app-small-card title="Receita Potencial" [icon]="HandCoins" color="purple"
            mainText="R$ {{ receitaPotencial | number:'1.2-2':'pt-BR'}}" subtitle="Receita Mensal Potencial">
        </app-small-card>
    </app-small-card-section>

    <div class="subtitulo">
        @if (perm.can('membros', 'create')) {
        <app-main-button [icon]="Plus" (click)="openModal()" [text]="'Novo Membro'"></app-main-button>
        }
    </div>

    <section class="bigTableSection">
        <app-consulta-membro></app-consulta-membro>
    </section>
</div>
