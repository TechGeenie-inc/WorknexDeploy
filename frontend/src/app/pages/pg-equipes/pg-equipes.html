<div class="page-container">
    <h1>Gerenciamento de Equipes</h1>
    <p>Organize e gerencie todas as equipes de trabalho</p>
    <app-small-card-section>

        <app-small-card title="Total de Equipes" mainText="{{ quantidadeEquipes }}" subtitle="Equipes Cadastradas"
            [icon]="Users" color="blue" (click)="filtrarTotal()">
        </app-small-card>
        <app-small-card title="Equipes Ativas" mainText="{{ quantidadeEmAndamento }}" subtitle="Projetos em andamento"
            [icon]="FolderClock" color="green" [selected]="cardSelecionado === 'ativas'" (click)="filtrarAtivas()">
        </app-small-card>
        <app-small-card title="Projetos Concluídos" mainText="{{ quantidadeConcluido }}"
            subtitle="Finalizados com sucesso" [icon]="CircleCheckBig" color="purple"
            [selected]="cardSelecionado === 'concluidas'" (click)="filtrarConcluidas()">
        </app-small-card>
        <app-small-card title="Equipes Pausadas" mainText="{{ quantidadePausado }}" subtitle="Temporariamente paradas"
            [icon]="CircleAlert" color=" orange" [selected]="cardSelecionado === 'pausadas'"
            (click)="filtragemPausadas()">

        </app-small-card>
    </app-small-card-section>

    <div class="subtitulo">
        @if(perm.can('equipes', 'create')) {
        <app-main-button [icon]="Plus" [text]="'Nova Equipe'" (click)="openModal()"></app-main-button>
        }
    </div>

    <section class="secondSection">
        <app-consulta-equipe></app-consulta-equipe>
    </section>
</div>
