<div class="page-container">
    <h1>Configurações</h1>
    <p>Personalize e Configure o Sistema.</p>

    <div class="segmentedControlSection">
        <app-segmented-control [options]="['Empresa', 'Visual', 'Minha Conta','Segurança','Sistema','Usuários']"
            [isGiant]="true" [selectedIndex]="0" (selectionChange)="onSelectionChange($event)">
        </app-segmented-control>
    </div>


    @if (selectedPage == 1) {
    <section class="secondSection">
        <app-config-visual></app-config-visual>
    </section>
    } @else if (selectedPage == 2) {
    <section class="secondSection">
        <app-config-account-info></app-config-account-info>
    </section>
    } @else if (selectedPage == 3) {
    <section class="secondSection">
        <app-config-security></app-config-security>
        <app-config-password></app-config-password>
    </section>
    } @else if (selectedPage == 4 ) {
    <section class="secondSection">
        <app-config-system></app-config-system>
        <app-config-database></app-config-database>
    </section>
    } @else if (selectedPage == 5 ) {
    <section class="secondSection">
        <app-config-acess-levels></app-config-acess-levels>
        <app-consulta-usuario></app-consulta-usuario>
    </section>
    } @else {
    <section class="secondSection">
        <app-config-info></app-config-info>
    </section>
    }
</div>
