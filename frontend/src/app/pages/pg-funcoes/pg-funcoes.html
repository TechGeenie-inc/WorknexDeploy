<div class="page-container">
    <h1>Funções</h1>
    <p>Cadastre e gerencie as funções cadastradas no sistema</p>
    <app-small-card-section>
        <app-small-card [icon]="Boxes" title="Funções Cadastradas" mainText="{{ totalFuncoes }}" subtitle="No sistema"
            color="green" (click)="filtrarTotal()" style="cursor:pointer">
        </app-small-card>
        <app-small-card [icon]="TriangleAlert" title="Funçoes Inativas" mainText="{{ funcoesInativas }}"
            subtitle="Sem membros ativos" color="orange" (click)="filtrarInativas()" style="cursor:pointer"
            [selected]="cardSelecionado === 'inativas'">
        </app-small-card>
        <app-small-card [icon]="CircleAlert" title="Funções em Risco" color="yellow" mainText="{{ funcoesUmMembro }}"
            subtitle="Com apenas 1 membro ativo" (click)="filtrarEmRisco()" style="cursor:pointer"
            [selected]="cardSelecionado === 'em Risco'">
        </app-small-card>
        <app-small-card [icon]="BookUser" title="Membros por Função" color="blue" mainText="{{ mediaMembrosFuncao }}"
            subtitle="Média de membros por função">
        </app-small-card>
    </app-small-card-section>

    <div class="subtitulo">
        @if(perm.can('funcoes', 'create')) {
            <app-main-button [icon]="Plus" [text]="'Nova Função'" (click)="openModal()"></app-main-button>
        }
    </div>

    <section class="bigTableSection">
        <app-consulta-funcao></app-consulta-funcao>
    </section>
</div>
